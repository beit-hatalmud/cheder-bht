<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <title>מצב המערכת — בית התלמוד</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="manifest" href="manifest.webmanifest">
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.min.css">
  <style>
    body{font-family:Heebo,system-ui,Arial,sans-serif;background:#f1f5f9;color:#1e293b;padding:24px 16px;max-width:680px;margin:0 auto}
    h1{color:#2563eb;margin-bottom:6px}
    .meta{color:#64748b;font-size:.92rem;margin-bottom:20px}
    .card-svc{background:#fff;border-radius:12px;padding:14px 18px;margin-bottom:10px;display:flex;align-items:center;gap:14px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
    .dot{width:14px;height:14px;border-radius:50%;background:#94a3b8;flex-shrink:0}
    .dot.ok{background:#16a34a}
    .dot.fail{background:#dc2626}
    .name{font-weight:600;flex:1}
    .latency{color:#64748b;font-size:.88rem;font-variant-numeric:tabular-nums}
    .hdr-card{background:#fff;border-radius:14px;padding:18px;margin-bottom:18px;text-align:center}
    .hdr-card .summary{font-size:1.4rem;font-weight:700}
    .hdr-card .summary.ok{color:#16a34a}
    .hdr-card .summary.warn{color:#f59e0b}
    .hdr-card .summary.bad{color:#dc2626}
    .small-note{font-size:.85rem;color:#64748b;margin-top:6px}
    a.subtle{color:#2563eb;text-decoration:none}
    a.subtle:hover{text-decoration:underline}
  </style>
</head>
<body>
  <h1>מצב המערכת</h1>
  <p class="meta">בית התלמוד מעלה עמוס · <span id="updated">בודק…</span></p>

  <div class="hdr-card">
    <div class="summary" id="summary">בודק…</div>
    <div class="small-note">דף זה מתעדכן אוטומטית כל 30 שניות.</div>
  </div>

  <div id="svc-list"></div>

  <p class="small-note" style="margin-top:24px;text-align:center">
    הדף הזה ציבורי — גישה ללא משתמש. לאתר עצמו: <a class="subtle" href="/cheder-bht/">cheder-bht</a>
  </p>

<script>
const SERVICES = [
  { id: 'pages', name: 'אתר GitHub Pages',  url: 'manifest.webmanifest' },
  { id: 'script', name: 'Backend (Apps Script)', url: 'https://script.google.com/macros/s/AKfycbzhRqTLE4fjjDqrH1we-JlGZ15R-ws8b_gfWF1xF1ewailaiyiS_YXqUhRtb3cQghVt/exec?action=ping' },
  { id: 'supa', name: 'Supabase (Postgres)', url: 'https://iythgizaqjivxtgwyexj.supabase.co/rest/v1/' },
  { id: 'gsi',  name: 'Google Sign-In', url: 'https://accounts.google.com/gsi/client' },
];

async function ping(s) {
  const t0 = performance.now();
  try {
    const ctl = new AbortController();
    const tt = setTimeout(() => ctl.abort(), 12000);
    await fetch(s.url + (s.url.includes('?') ? '&' : '?') + 't=' + Date.now(), { mode: 'no-cors', signal: ctl.signal });
    clearTimeout(tt);
    return { id: s.id, name: s.name, ok: true, ms: Math.round(performance.now() - t0) };
  } catch (e) {
    return { id: s.id, name: s.name, ok: false, ms: null };
  }
}

async function refresh() {
  const results = await Promise.all(SERVICES.map(ping));
  const okCount = results.filter(r => r.ok).length;
  const summary = document.getElementById('summary');
  if (okCount === SERVICES.length) {
    summary.textContent = 'כל המערכת פעילה ✓';
    summary.className = 'summary ok';
  } else if (okCount > 0) {
    summary.textContent = 'תקלה חלקית — ' + okCount + ' מתוך ' + SERVICES.length + ' שירותים';
    summary.className = 'summary warn';
  } else {
    summary.textContent = 'בעיה כללית — בדוק חיבור';
    summary.className = 'summary bad';
  }
  document.getElementById('svc-list').innerHTML = results.map(r => `
    <div class="card-svc">
      <span class="dot ${r.ok ? 'ok' : 'fail'}"></span>
      <span class="name">${r.name}</span>
      <span class="latency">${r.ok ? r.ms + 'ms' : 'אין תגובה'}</span>
    </div>`).join('');
  document.getElementById('updated').textContent = 'נבדק ' + new Date().toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

refresh();
setInterval(refresh, 30000);
</script>
</body>
</html>

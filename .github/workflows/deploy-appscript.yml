name: Deploy Apps Script (NetFree bypass)
on:
  workflow_dispatch:
  push:
    paths:
      - 'apps-script/**'
      - '.github/workflows/deploy-appscript.yml'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp@3.3.0

      - name: Restore clasp credentials
        env:
          CLASPRC: ${{ secrets.CLASPRC_JSON || secrets.NAME }}
        run: |
          if [ -z "$CLASPRC" ]; then
            echo "::error::Set CLASPRC_JSON secret (or NAME) in repo settings"
            exit 1
          fi
          # Sanity: must contain refresh_token to be a valid clasprc.json
          if ! echo "$CLASPRC" | grep -q "refresh_token"; then
            echo "::error::Secret content is not a valid .clasprc.json (no refresh_token field)"
            exit 1
          fi
          echo "$CLASPRC" > ~/.clasprc.json
          chmod 600 ~/.clasprc.json

      - name: Clone target Apps Script
        run: |
          # PRODUCTION script = the one whose /exec the frontend actually calls.
          # Verified by matching deployment AKfycbzhRqTLE4... to its owning script.
          mkdir -p _deploy && cd _deploy
          npx clasp clone 1Dby8H-Jp86gCbZ6-pzSK8s5LSsVOsrkFT5tVOZirNT6gHHvqZ_JJx09P

      - name: Copy v2 files into clone
        run: |
          cp apps-script/AuthV2.js _deploy/AuthV2.js
          cp apps-script/ValidateV2.js _deploy/ValidateV2.js
          # Webhook.js carries the router wiring (login/refreshSession/logout +
          # JWT gate). Repo copy = fresh production pull + surgical edits.
          cp apps-script/Webhook.js _deploy/Webhook.js
          # Monitoring.js — daily backup + health snapshot to Drive
          cp apps-script/Monitoring.js _deploy/Monitoring.js 2>/dev/null || true
          ls -la _deploy/ | head -20

      - name: Push to Apps Script
        working-directory: _deploy
        run: |
          npx clasp push --force

      - name: Update PRODUCTION deployment in place
        working-directory: _deploy
        run: |
          # Update the existing /exec deployment the frontend uses — NOT a new
          # one. This points the live URL at the freshly pushed code.
          npx clasp deploy -i AKfycbzhRqTLE4fjjDqrH1we-JlGZ15R-ws8b_gfWF1xF1ewailaiyiS_YXqUhRtb3cQghVt --description "v2-auth+validate $(date -u +%Y%m%d-%H%M)"

      - name: Verify deployment (login must return JSON, not HTML)
        run: |
          URL="https://script.google.com/macros/s/AKfycbzhRqTLE4fjjDqrH1we-JlGZ15R-ws8b_gfWF1xF1ewailaiyiS_YXqUhRtb3cQghVt/exec"
          echo "--- ping ---"
          curl -sL -m 15 "$URL?action=ping&token=BHT_AGENT_2026" | head -c 300; echo ""
          echo "--- login (bogus creds; must be JSON with ok:false, NOT 'unknown action') ---"
          BODY=$(curl -sL -m 15 "$URL?action=login&username=__probe__&password=__probe__")
          echo "$BODY" | head -c 300; echo ""
          if echo "$BODY" | grep -q "unknown action"; then
            echo "::error::login still routes to 'unknown action' — wiring not live"; exit 1
          fi
          if echo "$BODY" | grep -qi "<!doctype html"; then
            echo "::error::login returned HTML login page — deployment access misconfigured"; exit 1
          fi
          echo "::notice::AuthV2 wired & live. login returns JSON."
